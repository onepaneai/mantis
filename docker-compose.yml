version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password}
      POSTGRES_DB: llmsec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  llmsec:
    image: onepaneai/mantis
    depends_on:
      - db
    ports:
      - "80:8000"
      - "443:8000"
    volumes:
      - llmsec_data:/app/data
      - ./secrets:/app/secrets:ro
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-your_secure_password}@db:5432/llmsec
      - ENVIRONMENT=production
    restart: unless-stopped

volumes:
  llmsec_data:
  postgres_data:
